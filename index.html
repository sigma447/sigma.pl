<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>PHONK MODE</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
    text-align: center;
}

/* glitch text */
h1 {
    margin-top: 40px;
    font-size: 40px;
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% { transform: translate(0,0); }
    25% { transform: translate(2px,-2px); }
    50% { transform: translate(-2px,2px); }
    75% { transform: translate(2px,2px); }
    100% { transform: translate(0,0); }
}

/* eyes */
.eye {
    position: absolute;
    width: 100px;
    height: 100px;
    background: red;
    border-radius: 50%;
    top: 40%;
    box-shadow: 0 0 40px red, 0 0 100px red;
    animation: blink 0.3s infinite;
}

.eye.left { left: 30%; }
.eye.right { right: 30%; }

@keyframes blink {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
}

/* rain effect */
.rain {
    position: absolute;
    width: 2px;
    height: 20px;
    background: cyan;
    top: -20px;
    animation: fall 1s linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin-top: 20px;
    cursor: pointer;
}

</style>
</head>

<body>

<h1>PHONK YARA YARA MODE</h1>

<button onclick="start()">START</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d0b5c6d1c7.mp3?filename=dark-phonk-ambient-112191.mp3">
</audio>

<div class="eye left"></div>
<div class="eye right"></div>

<script>
function start() {
    document.getElementById("music").play();
}

/* rain generator */
setInterval(() => {
    let drop = document.createElement("div");
    drop.classList.add("rain");
    drop.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(drop);

    setTimeout(() => {
        drop.remove();
    }, 1000);
}, 50);
</script>

</body>
</html>
