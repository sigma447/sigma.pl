<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokaz IP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f4f4f4;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
        }

        #ip {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="startBtn">Start</button>
    <div id="ip"></div>

    <script>
        document.getElementById("startBtn").addEventListener("click", async () => {
            try {
                const response = await fetch("https://api.ipify.org?format=json");
                const data = await response.json();

                document.getElementById("ip").textContent =
                    "Twój adres IP: " + data.ip;
            } catch (error) {
                document.getElementById("ip").textContent =
                    "Nie udało się pobrać adresu IP.";
            }
        });
    </script>

</body>
</html><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moja strona</title>

<meta property="og:title" content="Moja strona">
<meta property="og:description" content="Kliknij Start aby zobaczyć IP">

</head>
<body>

<button onclick="pokazIP()">Start</button>
<p id="wynik"></p>

<script>
async function pokazIP() {
    const response = await fetch("https://api.ipify.org?format=json");
    const data = await response.json();
    document.getElementById("wynik").innerText = "Twoje IP: " + data.ip;
}
</script>

</body>
</html>
