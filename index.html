<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moja strona</title>

<meta property="og:title" content="Moja strona">
<meta property="og:description" content="Kliknij Start aby zobaczyć IP">

</head>
<body>

<button onclick="pokazIP()">Start</button>
<p id="wynik"></p>

<script>
async function pokazIP() {
    const response = await fetch("https://api.ipify.org?format=json");
    const data = await response.json();
    document.getElementById("wynik").innerText = "Twoje IP: " + data.ip;
}
</script>

</body>
</html>
